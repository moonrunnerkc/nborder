name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run ruff
        run: ruff check src tests

      - name: Run mypy
        run: mypy src

      - name: Run pytest
        run: pytest --cov=nborder --cov-fail-under=70 --cov-report=term-missing

      - name: Self-test on clean roundtrip fixtures
        run: nborder check tests/fixtures/roundtrip
